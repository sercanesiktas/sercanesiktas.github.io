# Site settings
title: Sercan EŞİKTAŞ 
description: 'Sercan EŞİKTAŞ - Kişisel Bloğu'
url: 'http://sercanesiktas.github.io'
baseurl: '/'
google_analytics: 'G-VZV3ZZ9JYP'
disqus_shortname: 'sercanesiktasgithubio'
# disable_landing_page: true

author:
  name: 'Sercan EŞİKTAŞ'
  email: sercanesiktas@gmail.com
  twitter_username: sercanesiktas
  facebook_username: sercanesiktas
  github_username:  sercanesiktas
  linkedin_username:  sercanesiktas

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
        layout: 'post'

# Build settings
destination: _site
paginate: 10
permalink: /:year/:title/
markdown: kramdown
highlighter: rouge

sass:
    sass_dir: _sass
    style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

plugins: ['jekyll-paginate']
exclude: ['README.md', 'Gemfile', 'Gemfile.lock', 'screenshot.png']
